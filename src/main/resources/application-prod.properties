# =====================================================
# Perfil de PRODUCCION - Trego (activar con SPRING_PROFILES_ACTIVE=prod)
# Autosuficiente: NO depende de application.properties (que esta gitignored).
# Los valores sensibles y los dependientes del entorno se leen de variables
# de entorno (definidas en el .env de la EC2).
# =====================================================

# ===== Datasource: RDS MySQL =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== Servidor (detras del proxy de Vercel) =====
server.forward-headers-strategy=framework

# ===== CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept
app.cors.allow-credentials=true
app.cors.max-age=3600

# ===== JWT =====
jwt.secret=${JWT_SECRET}

# ===== MercadoPago =====
mercadopago.access.token=${MP_ACCESS_TOKEN}
mercadopago.webhook.url=${MP_WEBHOOK_URL:}
mercadopago.back.url.success=${FRONT_URL}/success
mercadopago.back.url.failure=${FRONT_URL}/failure
mercadopago.back.url.pending=${FRONT_URL}/pending
mercadopago.back.url.mobile.success=trego://pago/success
mercadopago.back.url.mobile.failure=trego://pago/failure
mercadopago.back.url.mobile.pending=trego://pago/pending

# ===== Geoapify =====
geoapify.api.key=${GEOAPIFY_KEY}

# ===== Cloudinary =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ===== Firebase Web =====
firebase.web.project-id=${FIREBASE_PROJECT_ID}
firebase.client.api-key=${FIREBASE_API_KEY}
# Ruta al service-account.json montado en runtime (vacio = buscar en classpath).
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}

# ===== SMTP (Gmail App Password) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== Notificaciones / soporte =====
mail.from=${MAIL_USERNAME}
mail.from.name=Trego

# ===== Admin de pruebas =====
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
